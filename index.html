<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diego Tavares</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0
      padding: 0;
    }

    :root {
      --bg:         #383B56;
      --text:       #EDE8DF;
      --text-muted: #9AA0BB;
      --accent:     #C4813A;
      --border:     rgba(237, 232, 223, 0.09);
    }

    html {
      scroll-behavior: smooth;
      color-scheme: dark;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 2rem 2.5rem;
      text-align: center;
      gap: 2rem;
    }

    .hero__name {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-style: normal;
      font-size: clamp(3.2rem, 11vw, 7rem);
      letter-spacing: 0.03em;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }

    .hero__tagline {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }

    .hero__buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem 1.6rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(196,129,58,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .btn--accent { border-color: var(--accent); color: var(--accent); }
    .btn--accent:hover { background: var(--accent); color: var(--bg); }

    /* ── Photo ── */
    .photo-section {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 2rem;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.65s forwards;
    }

    .photo-section img {
      width: 100%;
      display: block;
      filter: grayscale(10%) contrast(1.04);
    }

    /* ── Contato ── */
    .section {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 4rem auto 0;
      padding: 3.5rem 2rem;
      border-top: 1px solid var(--border);
    }

    .section__title {
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.8rem;
    }

    .contact-grid { display: flex; flex-direction: column; gap: 1.5rem; }

    .contact-item__label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .contact-item__value a {
      color: var(--text);
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-style: normal;
      font-size: 1.05rem;
      transition: color 0.2s;
    }
    .contact-item__value a:hover { color: var(--accent); }

    .whatsapp-btn {
      margin-top: 0.5rem;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer__copy {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
  
    /* ── Mini Player ── */
    .mini-player {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.55rem 1.1rem 0.55rem 0.55rem;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
      max-width: 320px;
      width: 100%;
    }
    .mini-player__play {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, background 0.2s;
    }
    .mini-player__play:hover { transform: scale(1.08); }
    .mini-player__play svg { width: 14px; height: 14px; fill: #fff; }
    .mini-player__info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 0.3rem;
    }
    .mini-player__title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-player__bar-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .mini-player__bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .mini-player__time {
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-align: right;
      flex-shrink: 0;
    }

</style>
</head>
<body>

  <section class="hero">
    <h1 class="hero__name">Diego Tavares</h1>
    <div class="mini-player" id="miniPlayer">
      <button class="mini-player__play" id="playerBtn" aria-label="Play/Pause">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div class="mini-player__info">
        <div class="mini-player__title">Plano B · Preview</div>
        <div class="mini-player__bar-wrap" id="playerBarWrap">
          <div class="mini-player__bar-fill" id="playerBarFill"></div>
        </div>
      </div>
      <span class="mini-player__time" id="playerTime">0:00</span>
      <audio id="previewAudio" preload="none" src="https://drive.google.com/uc?export=download&id=1MFVjuQ_TUOl3xHko_j6zah1WDB9lcS5B"></audio>
    </div>
    <p class="hero__tagline">Não Saber é a Graça</p>
    <div class="hero__buttons">

        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path fill="#fff" d="M17.441 17.317a.748.748 0 01-1.03.249c-2.82-1.723-6.369-2.112-10.546-1.158a.748.748 0 01-.332-1.459c4.573-1.044 8.492-.594 11.659 1.338.354.217.466.677.249 1.03zm1.451-3.23a.937.937 0 01-1.288.308c-3.226-1.983-8.143-2.558-11.957-1.4a.938.938 0 01-.545-1.794c4.358-1.322 9.776-.682 13.482 1.598a.937.937 0 01.308 1.288zm.124-3.363C15.522 8.7 9.346 8.498 5.96 9.521a1.125 1.125 0 11-.653-2.152c3.93-1.19 10.468-.96 14.599 1.618a1.125 1.125 0 11-1.09 1.937z"/></svg>
        Spotify
      </a>
      <a class="btn" href="https://youtube.com/@diegotavares0" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path fill="#fff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

      <a class="btn" href="https://instagram.com/diegotavares" target="_blank" rel="noopener">

    </div>
  </section>

  <div class="photo-section">
    <img src="/foto.png" alt="Diego Tavares tocando violão no palco" />

    <div class="contact-grid">
      <div class="contact-item">

        <div class="contact-item__value"><a href="mailto:shows@diegotavares.com">shows@diegotavares.com</a></div>
      </div>
      <div class="contact-item">
        <div class="contact-item__label">Imprensa</div>
        <div class="contact-item__value"><a href="mailto:imprensa@diegotavares.com">imprensa@diegotavares.com</a></div>
      </div>
      <div class="contact-item whatsapp-btn">

  <footer>
    <span class="footer__copy">&copy; 2025 Diego Tavares</span>
  </footer>


  <script>
    (function() {
      const audio = document.getElementById('previewAudio');
      const btn   = document.getElementById('playerBtn');
      const iconPlay  = document.getElementById('iconPlay');
      const iconPause = document.getElementById('iconPause');
      const fill  = document.getElementById('playerBarFill');
      const timeEl = document.getElementById('playerTime');
      const barWrap = document.getElementById('playerBarWrap');
      const MAX = 45;

      function fmt(s) {
        const m = Math.floor(s/60), sec = Math.floor(s%60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      btn.addEventListener('click', () => {
        if (audio.paused) { audio.play(); }
        else { audio.pause(); }
      });

      audio.addEventListener('play', () => {
        iconPlay.style.display = 'none';
        iconPause.style.display = '';
      });
      audio.addEventListener('pause', () => {
        iconPlay.style.display = '';
        iconPause.style.display = 'none';
      });

      audio.addEventListener('timeupdate', () => {
        const t = audio.currentTime;
        if (t >= MAX) { audio.pause(); audio.currentTime = 0; return; }
        const pct = (t / MAX) * 100;
        fill.style.width = pct + '%';
        timeEl.textContent = fmt(t) + ' / ' + fmt(MAX);
      });

      barWrap.addEventListener('click', (e) => {
        const rect = barWrap.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * MAX;
      });

      audio.addEventListener('ended', () => {
        fill.style.width = '0%';
        timeEl.textContent = '0:00';
      });
    })();
  </script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
